<script>
  const CW_PASSWORD = "craftworld2024"; // <── CAMBIA ESTO
  function simpleHash(s){let h=0;for(let i=0;i<s.length;i++){h=Math.imul(31,h)+s.charCodeAt(i)|0;}return h.toString(36);}
  const EXPECTED=""; // se calcula en runtime
  const SESSION_KEY="cw_session_v2";
  window._cwAuth={
    check:()=>sessionStorage.getItem(SESSION_KEY)===simpleHash(CW_PASSWORD),
    login:(pass)=>{if(simpleHash(pass)===simpleHash(CW_PASSWORD)){sessionStorage.setItem(SESSION_KEY,simpleHash(CW_PASSWORD));return true;}return false;}
  };

══════════════════════════════════════════════ */
function LoginScreen({ onAuth }) {
  const [pass,setPass]=useState(""); const [error,setError]=useState(false); const [shake,setShake]=useState(false);
  const inputRef=useRef(null);
  useEffect(()=>{ inputRef.current?.focus(); },[]);
  const attempt=()=>{
    if(window._cwAuth.login(pass)){ onAuth(); }
    else{ setError(true);setShake(true);setPass(""); setTimeout(()=>setShake(false),500); setTimeout(()=>inputRef.current?.focus(),100); }
  };
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:20,animation:"fadeIn .5s ease"}}>
      <div style={{width:"100%",maxWidth:360,background:"#09101d",border:"1px solid #0e1e30",borderRadius:14,padding:"40px 32px",display:"flex",flexDirection:"column",alignItems:"center",gap:22,animation:shake?"shake .45s ease":"none"}}>

          <div style={{fontSize:9,color:"#00e5a070",letterSpacing:5,marginTop:4}}>PRICE TRACKER · PRIVADO</div>
        </div>

        <div style={{width:"100%",display:"flex",flexDirection:"column",gap:8}}>
          <label style={{fontSize:10,color:"#2a4a5a",textTransform:"uppercase",letterSpacing:1}}>Contraseña</label>
          <input ref={inputRef} type="password" value={pass}
            onChange={e=>{setPass(e.target.value);setError(false);}}
            onKeyDown={e=>e.key==="Enter"&&attempt()}
            placeholder="••••••••"
            style={{width:"100%",background:"#070b12",border:`1px solid ${error?"#ff3a3a60":"#0e1e30"}`,color:"#e8f4ff",padding:"12px 14px",borderRadius:6,fontFamily:"'Courier New',monospace",fontSize:16,letterSpacing:4}}/>

      </div>
    </div>
  );
}

const COIN_ADDR = "0x8d896c96ffcafbf12d86dd4510236de7bcfa7dcf";
const GT_BASE   = "https://api.geckoterminal.com/api/v2/networks/ronin/tokens";
const RECORDS_KEY = "cw_records_v4";
const THREE_DAYS_MS = 3*24*60*60*1000;

const sleep    = ms => new Promise(r=>setTimeout(r,ms));
const nowISO   = ()  => new Date().toISOString();
const fmtDate  = iso => new Date(iso).toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit",year:"numeric"});
const fmtTime  = iso => new Date(iso).toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
const purgeOld = arr => arr.filter(r=>Date.now()-new Date(r.ts).getTime()<THREE_DAYS_MS);

function fmtNum(n,digits=6){
  if(n==null||isNaN(n)) return "—";
  const f=parseFloat(n);
  if(!isFinite(f)||f===0) return "0";
  if(f<0.000001) return f.toExponential(3);
  if(f<1)        return f.toPrecision(digits>4?5:4);
  if(f<1000)     return f.toFixed(4);
  return f.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
}
function compact(n){
  const f=parseFloat(n);
  if(!isFinite(f)) return "—";
  if(f>=1e9) return (f/1e9).toFixed(2)+"B";
  if(f>=1e6) return (f/1e6).toFixed(2)+"M";
  if(f>=1e3) return (f/1e3).toFixed(2)+"K";
  return f.toFixed(2);
}

const DB={
  get(k,fb=null){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{try{const r=purgeOld(JSON.parse(localStorage.getItem(RECORDS_KEY)||"[]"));localStorage.setItem(RECORDS_KEY,JSON.stringify(r));localStorage.setItem(k,JSON.stringify(v));}catch{}}}
};

/* Fetch batch de hasta 30 tokens */
async function fetchBatch(addresses){
  const chunk=addresses.slice(0,30).join(",");
  try{
    const res=await fetch(`${GT_BASE}/multi/${chunk}`,{headers:{Accept:"application/json"},signal:AbortSignal.timeout(20000)});
    if(!res.ok) return {};
    const json=await res.json();
    const out={};
    for(const item of json.data||[]){
      const addr=item.attributes?.address?.toLowerCase();
      const a=item.attributes;
      if(!addr) continue;
      out[addr]={
        price_usd:  parseFloat(a.price_usd||0)||0,
        vol_24h:    parseFloat(a.volume_usd?.h24||0)||0,
        vol_1h:     parseFloat(a.volume_usd?.h1||0)||0,
        chg_1h:     parseFloat(a.price_change_percentage?.h1||0)||0,
        chg_24h:    parseFloat(a.price_change_percentage?.h24||0)||0,
        fdv:        parseFloat(a.fdv_usd||0)||0,
      };
    }
    return out;
  }catch{return {};}
}

/* ══════════════════════════════════════════════
   TRACKER PRINCIPAL
══════════════════════════════════════════════ */
function Tracker({ onLogout }) {
  const [prices,   setPrices  ]=useState({});       // addr -> data
  const [records,  setRecords ]=useState([]);
  const [fetching, setFetching]=useState(false);
  const [prog,     setProg    ]=useState({done:0,total:0});
  const [lastFetch,setLastFetch]=useState(null);
  const [status,   setStatus  ]=useState("");
  const [tab,      setTab     ]=useState("dashboard");
  const [catFilter,setCatFilter]=useState("all");
  const [search,   setSearch  ]=useState("");
  const [autoMin,  setAutoMin ]=useState(0);
  const [sortBy,   setSortBy  ]=useState("price_coin"); // price_coin | chg_24h | vol_24h
  const [filterHist,setFilterHist]=useState("all");
  const iRef=useRef(null);

  useEffect(()=>{
    const r=DB.get(RECORDS_KEY,[]);
    const clean=purgeOld(r);
    setRecords(clean);
    if(clean.length!==r.length) DB.set(RECORDS_KEY,clean);
    // Restaurar último precio de localStorage
    const last={};
    clean.slice().reverse().forEach(rec=>{
      if(!last[rec.addr]) last[rec.addr]=rec;
    });
    if(Object.keys(last).length) setPrices(last);
  },[]);

  useEffect(()=>{
    if(iRef.current) clearInterval(iRef.current);
    if(autoMin>0) iRef.current=setInterval(doFetch,autoMin*60*1000);
    return ()=>clearInterval(iRef.current);
  },[autoMin]);

  const doFetch=useCallback(async()=>{
    if(fetching) return;
    setFetching(true); setStatus("Consultando GeckoTerminal…");

    const addrs=TOKENS.map(t=>t.addr);
    // Hacemos en lotes de 30
    const batches=[];
    for(let i=0;i<addrs.length;i+=30) batches.push(addrs.slice(i,i+30));
    setProg({done:0,total:batches.length});

    const allData={};
    for(let i=0;i<batches.length;i++){
      const d=await fetchBatch(batches[i]);
      Object.assign(allData,d);
      setProg({done:i+1,total:batches.length});
      if(i<batches.length-1) await sleep(600);
    }

    const coinUsd=allData[COIN_ADDR]?.price_usd||0;
    const ts=nowISO();
    const newPrices={};
    const newRecs=[];

    for(const t of TOKENS){
      const d=allData[t.addr.toLowerCase()]||allData[t.addr]||null;
      const priceUsd=d?.price_usd||0;
      const priceCoin=coinUsd>0&&priceUsd>0?(priceUsd/coinUsd):0;
      newPrices[t.addr]={...d, price_usd:priceUsd, price_coin:priceCoin, coin_usd:coinUsd, ts};
      newRecs.push({addr:t.addr,name:t.name,em:t.em,cat:t.cat,...(d||{}),price_usd:priceUsd,price_coin:priceCoin,coin_usd:coinUsd,ts});
    }

    setPrices(newPrices);
    const merged=purgeOld([...records,...newRecs]);
    setRecords(merged);
    DB.set(RECORDS_KEY,merged);
    setLastFetch(ts);
    const ok=Object.values(newPrices).filter(d=>d.price_usd>0).length;
    setStatus(`✅ ${ok}/${TOKENS.length} tokens OK · ${fmtDate(ts)} ${fmtTime(ts)}`);
    setFetching(false);
  },[fetching,records]);

  // Precio en COIN de cada token
  const coinUsd=prices[COIN_ADDR]?.price_usd||0;
  const tokensWithPrices=TOKENS.map(t=>({
    ...t,
    price_usd:   prices[t.addr]?.price_usd||0,
    price_coin:  prices[t.addr]?.price_coin||0,
    chg_24h:     prices[t.addr]?.chg_24h||0,
    chg_1h:      prices[t.addr]?.chg_1h||0,
    vol_24h:     prices[t.addr]?.vol_24h||0,
    fdv:         prices[t.addr]?.fdv||0,
    hasData:     (prices[t.addr]?.price_usd||0)>0,
    ts:          prices[t.addr]?.ts||null,
  }));

  // Filtros dashboard
  const visible=tokensWithPrices
    .filter(t=>t.name!=="COIN")
    .filter(t=>catFilter==="all"||t.cat===catFilter)
    .filter(t=>!search||t.name.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>{
      if(sortBy==="chg_24h") return b.chg_24h-a.chg_24h;
      if(sortBy==="vol_24h") return b.vol_24h-a.vol_24h;
      return b.price_coin-a.price_coin;
    });

  // Resumen
  const sinCoin=tokensWithPrices.filter(t=>t.name!=="COIN"&&t.hasData);
  const top3Up  =sinCoin.slice().sort((a,b)=>b.chg_24h-a.chg_24h).slice(0,3);
  const top3Dn  =sinCoin.slice().sort((a,b)=>a.chg_24h-b.chg_24h).slice(0,3);
  const top3Vol =sinCoin.slice().sort((a,b)=>b.vol_24h-a.vol_24h).slice(0,3);
  const top3Price=sinCoin.slice().sort((a,b)=>b.price_coin-a.price_coin).slice(0,3);

  // Historial
  const histRecs=(filterHist==="all"?records:records.filter(r=>r.name===filterHist)).slice().reverse();

  const pct=prog.total>0?Math.round(prog.done/prog.total*100):0;

  const exportCSV=()=>{
    const hdr=["Token","Categoría","Precio USD","Precio COIN","Cambio 1h %","Cambio 24h %","Vol 24h USD","FDV","Fecha","Hora"];
    const body=histRecs.map(r=>[
      r.name,r.cat,r.price_usd||"",r.price_coin||"",r.chg_1h||"",r.chg_24h||"",
      r.vol_24h||"",r.fdv||"",fmtDate(r.ts),fmtTime(r.ts)
    ].join(",")).join("\n");
    const blob=new Blob(["\uFEFF"+hdr.join(",")+"\n"+body],{type:"text/csv;charset=utf-8;"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download=`craftworld_${new Date().toISOString().slice(0,16).replace(/[:T]/g,"_")}.csv`;
    a.click();
  };

  const C={
    btn:{padding:"8px 16px",borderRadius:5,border:"none",fontSize:12,fontFamily:"'Courier New',monospace"},
    th:{background:"#09101d",color:"#2a4a5a",padding:"8px 10px",textAlign:"left",borderBottom:"1px solid #0e1e30",textTransform:"uppercase",letterSpacing:1,fontSize:9,whiteSpace:"nowrap"},
    td:{padding:"7px 10px",whiteSpace:"nowrap",fontSize:11},
  };

  const CAT_LABELS={all:"Todos",base:"Base",elemento:"Elementos",tierra:"🌍 Tierra",agua:"💧 Agua",fuego:"🔥 Fuego",especial:"⭐ Especiales"};

  return (
    <div>
      {/* HEADER */}
      <header style={{display:"flex",alignItems:"center",gap:12,padding:"12px 20px",background:"#09101d",borderBottom:"1px solid #0e1e30",flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:34,animation:"glowHex 4s ease infinite"}}>⬡</span>
          <div>
            <div style={{fontSize:14,fontWeight:"bold",color:"#e8f4ff",letterSpacing:4}}>CRAFT WORLD</div>
            <div style={{fontSize:8,color:"#00e5a070",letterSpacing:4}}>RONIN · PRICE TRACKER</div>
          </div>
        </div>

        <div style={{flex:1,minWidth:180}}>
          {fetching&&(
            <div style={{position:"relative",background:"#0c1a28",border:"1px solid #152840",borderRadius:5,height:22}}>
              <div style={{position:"absolute",inset:"0 auto 0 0",width:pct+"%",background:"linear-gradient(90deg,#00e5a0,#00c8ff)",borderRadius:5,transition:"width .4s"}}/>
              <span style={{position:"absolute",width:"100%",textAlign:"center",top:3,fontSize:9,color:"#fff",mixBlendMode:"difference"}}>{prog.done}/{prog.total} lotes · {pct}%</span>
            </div>
          )}
          {coinUsd>0&&!fetching&&(
            <div style={{fontSize:11,color:"#00e5a070"}}>🪙 1 COIN = <strong style={{color:"#00e5a0"}}>${fmtNum(coinUsd,8)}</strong></div>
          )}
        </div>

        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          {lastFetch&&!fetching&&<span style={{fontSize:9,color:"#2a3a4a"}}>🕐 {fmtDate(lastFetch)} {fmtTime(lastFetch)}</span>}
          <button onClick={doFetch} disabled={fetching}
            style={{...C.btn,background:"#0d2a1a",color:"#00e5a0",border:"1px solid #00e5a030",fontWeight:"bold"}}>
            {fetching?"↻ Consultando…":"↻ Actualizar"}
          </button>
          <button onClick={()=>{sessionStorage.clear();onLogout();}}
            style={{...C.btn,background:"#1a0d0d",color:"#ff6060",border:"1px solid #ff303020"}}>⎋ Salir</button>
        </div>
      </header>

      {status&&<div style={{background:"#050e0a",borderBottom:"1px solid #0c2016",padding:"5px 20px",fontSize:11,color:"#00e5a0",animation:"slideDown .3s ease"}}>{status}</div>}

      {/* TABS */}
      <nav style={{display:"flex",alignItems:"center",background:"#09101d",borderBottom:"1px solid #0e1e30",padding:"0 12px",overflowX:"auto"}}>
        {[["dashboard","📊 Dashboard"],["resumen","⚡ Resumen"],["history","📋 Historial"],["settings","⚙ Config"]].map(([id,lbl])=>(
          <button key={id} onClick={()=>setTab(id)}
            style={{background:"none",border:"none",color:tab===id?"#00e5a0":"#2a3a4a",padding:"10px 14px",fontSize:11,letterSpacing:1,borderBottom:tab===id?"2px solid #00e5a0":"2px solid transparent",transition:"all .2s",whiteSpace:"nowrap"}}>
            {lbl}
          </button>
        ))}
        <span style={{flex:1}}/>
        <span style={{fontSize:9,color:"#111820",whiteSpace:"nowrap"}}>{TOKENS.length} tokens · Ronin · GeckoTerminal</span>
      </nav>

      <main style={{padding:"16px 16px 48px",maxWidth:1400,margin:"0 auto"}}>

        {/* ══ DASHBOARD ══ */}
        {tab==="dashboard"&&(
          <>
            {/* Stats rápidas */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:10,marginBottom:14}}>
              {[
                ["Tokens",TOKENS.length],
                ["Con datos",tokensWithPrices.filter(t=>t.hasData).length],
                ["1 COIN",coinUsd>0?"$"+fmtNum(coinUsd,6):"—"],
                ["Registros",records.length],
                ["Última actualiz.",lastFetch?fmtTime(lastFetch):"—"],
              ].map(([l,v])=>(
                <div key={l} style={{background:"#09101d",border:"1px solid #0e1e30",borderRadius:7,padding:"11px 13px"}}>
                  <span style={{display:"block",fontSize:18,fontWeight:"bold",color:"#e8f4ff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{v}</span>
                  <span style={{display:"block",fontSize:8,color:"#2a3a4a",textTransform:"uppercase",letterSpacing:1,marginTop:2}}>{l}</span>
                </div>
              ))}
            </div>

            {/* Controles */}
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12,alignItems:"center"}}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Buscar token…"
                style={{background:"#09101d",border:"1px solid #0e1e30",color:"#b0c4d8",padding:"7px 12px",borderRadius:5,fontFamily:"monospace",fontSize:11,minWidth:160}}/>

              <select value={catFilter} onChange={e=>setCatFilter(e.target.value)}
                style={{background:"#09101d",border:"1px solid #0e1e30",color:"#b0c4d8",padding:"7px 10px",borderRadius:5,fontFamily:"monospace",fontSize:11}}>
                {Object.entries(CAT_LABELS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
              </select>

              <select value={sortBy} onChange={e=>setSortBy(e.target.value)}
                style={{background:"#09101d",border:"1px solid #0e1e30",color:"#b0c4d8",padding:"7px 10px",borderRadius:5,fontFamily:"monospace",fontSize:11}}>
                <option value="price_coin">Ordenar: Precio COIN ↓</option>
                <option value="chg_24h">Ordenar: Cambio 24h ↓</option>
                <option value="vol_24h">Ordenar: Volumen 24h ↓</option>
              </select>

              <span style={{fontSize:10,color:"#2a3545",marginLeft:"auto"}}>{visible.length} tokens</span>
            </div>

            {/* Cards */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10}}>
              {visible.map(t=>{
                const isUp=t.chg_24h>=0;
                return (
                  <div key={t.addr} className="pool-card"
                    style={{background:"#09101d",border:"1px solid #0e1e30",borderRadius:7,padding:12,display:"flex",flexDirection:"column",gap:5}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontSize:18}}>{t.em}</span>
                      <span style={{fontWeight:"bold",color:"#e8f4ff",fontSize:13}}>{t.name}</span>
                      <span style={{marginLeft:"auto",fontSize:8,background:{base:"#1a2a1a",elemento:"#1a1a3a",tierra:"#2a1a0a",agua:"#0a1a2a",fuego:"#2a0a0a",especial:"#1a0a2a"}[t.cat]||"#0e1e30",color:{base:"#00e5a0",elemento:"#6080ff",tierra:"#c87040",agua:"#4080c0",fuego:"#ff6040",especial:"#c040c0"}[t.cat]||"#5a8a9a",padding:"2px 6px",borderRadius:3,textTransform:"uppercase",letterSpacing:1}}>{t.cat}</span>
                    </div>

                    {t.hasData?(
                      <>
                        <div style={{display:"flex",flexDirection:"column",gap:2}}>
                          <div style={{display:"flex",alignItems:"baseline",gap:6}}>
                            <span style={{fontSize:15,fontWeight:"bold",color:"#00e5a0"}}>{fmtNum(t.price_coin,5)} COIN</span>
                          </div>
                          <div style={{fontSize:10,color:"#3a5a6a"}}>${fmtNum(t.price_usd)}</div>
                        </div>
                        <div style={{display:"flex",gap:6,alignItems:"center"}}>
                          <span style={{fontSize:11,fontWeight:"bold",color:isUp?"#00e5a0":"#ff6060"}}>{isUp?"▲":"▼"} {Math.abs(t.chg_24h).toFixed(2)}%</span>
                          <span style={{fontSize:9,color:"#2a3545"}}>24h</span>
                          {t.chg_1h!==0&&<span style={{fontSize:9,color:t.chg_1h>=0?"#00a070":"#cc4040",marginLeft:"auto"}}>{t.chg_1h>=0?"+":""}{t.chg_1h.toFixed(2)}% 1h</span>}
                        </div>
                        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                          {t.vol_24h>0&&<span style={{fontSize:9,color:"#2a4a5a",background:"#0c1520",padding:"2px 5px",borderRadius:3}}>Vol: ${compact(t.vol_24h)}</span>}
                          {t.fdv>0&&<span style={{fontSize:9,color:"#2a4a5a",background:"#0c1520",padding:"2px 5px",borderRadius:3}}>FDV: ${compact(t.fdv)}</span>}
                        </div>
                      </>
                    ):(
                      <div style={{fontSize:10,color:"#1e3040",fontStyle:"italic",padding:"8px 0"}}>Sin datos — presiona Actualizar</div>
                    )}
                  </div>
                );
              })}
            </div>
          </>
        )}

        {/* ══ RESUMEN ══ */}
        {tab==="resumen"&&(
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
            {[
              {title:"🚀 Mayores subidas 24h", items:top3Up,  color:"#00e5a0", val:t=>`${t.chg_24h>=0?"+":""}${t.chg_24h.toFixed(2)}%`},
              {title:"💀 Mayores bajas 24h",   items:top3Dn,  color:"#ff6060", val:t=>`${t.chg_24h.toFixed(2)}%`},
              {title:"📦 Más volumen 24h",     items:top3Vol, color:"#7ecff0", val:t=>`$${compact(t.vol_24h)}`},
              {title:"👑 Más caros en COIN",   items:top3Price,color:"#c8a040",val:t=>`${fmtNum(t.price_coin,4)} COIN`},
            ].map(({title,items,color,val})=>(
              <div key={title} style={{background:"#09101d",border:"1px solid #0e1e30",borderRadius:10,padding:16}}>
                <div style={{fontSize:12,color:"#5a8aaa",letterSpacing:1,marginBottom:12,fontWeight:"bold"}}>{title}</div>
                {items.length===0
                  ?<div style={{color:"#1e3040",fontSize:11}}>Sin datos — presiona Actualizar</div>
                  :items.map((t,i)=>(
                    <div key={t.addr} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:i<items.length-1?"1px solid #0e1e30":"none"}}>
                      <span style={{fontSize:10,color:"#2a3545",width:16}}>{i+1}.</span>
                      <span style={{fontSize:18}}>{t.em}</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:12,fontWeight:"bold",color:"#e8f4ff"}}>{t.name}</div>
                        <div style={{fontSize:10,color:"#3a5a6a"}}>{fmtNum(t.price_coin,4)} COIN · ${fmtNum(t.price_usd)}</div>
                      </div>
                      <span style={{fontSize:12,fontWeight:"bold",color}}>{val(t)}</span>
                    </div>
                  ))
                }
              </div>
            ))}

            {/* Tabla completa ordenada */}
            <div style={{gridColumn:"1/-1",background:"#09101d",border:"1px solid #0e1e30",borderRadius:10,padding:16,overflowX:"auto"}}>
              <div style={{fontSize:12,color:"#5a8aaa",letterSpacing:1,marginBottom:12,fontWeight:"bold"}}>📊 Todos los tokens ordenados por precio</div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                <thead><tr>
                  {["#","Token","Precio COIN","Precio USD","1h %","24h %","Vol 24h"].map(h=><th key={h} style={C.th}>{h}</th>)}
                </tr></thead>
                <tbody>
                  {sinCoin.slice().sort((a,b)=>b.price_coin-a.price_coin).map((t,i)=>(
                    <tr key={t.addr} style={{background:i%2===0?"#070b12":"#09101d"}}>
                      <td style={{...C.td,color:"#2a3545"}}>{i+1}</td>
                      <td style={C.td}><span style={{marginRight:6}}>{t.em}</span><strong style={{color:"#e8f4ff"}}>{t.name}</strong></td>
                      <td style={{...C.td,color:"#00e5a0",fontWeight:"bold"}}>{fmtNum(t.price_coin,4)}</td>
                      <td style={{...C.td,color:"#3a6a5a"}}>${fmtNum(t.price_usd)}</td>
                      <td style={{...C.td,color:t.chg_1h>=0?"#00e5a0":"#ff6060"}}>{t.chg_1h>=0?"+":""}{t.chg_1h.toFixed(2)}%</td>
                      <td style={{...C.td,color:t.chg_24h>=0?"#00e5a0":"#ff6060"}}>{t.chg_24h>=0?"+":""}{t.chg_24h.toFixed(2)}%</td>
                      <td style={C.td}>{t.vol_24h>0?"$"+compact(t.vol_24h):"—"}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* ══ HISTORIAL ══ */}
        {tab==="history"&&(
          <>
            <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12,flexWrap:"wrap"}}>
              <select value={filterHist} onChange={e=>setFilterHist(e.target.value)}
                style={{background:"#09101d",border:"1px solid #0e1e30",color:"#b0c4d8",padding:"7px 10px",borderRadius:5,fontFamily:"monospace",fontSize:11}}>
                <option value="all">Todos los tokens</option>
                {TOKENS.map(t=><option key={t.addr} value={t.name}>{t.em} {t.name}</option>)}
              </select>
              <button onClick={exportCSV} style={{...C.btn,background:"#0d2a1a",color:"#00e5a0",border:"1px solid #00e5a030"}}>⬇ Descargar CSV</button>
              <span style={{fontSize:10,color:"#2a3a4a",marginLeft:"auto"}}>{histRecs.length} registros</span>
            </div>
            {histRecs.length===0
              ?<div style={{color:"#2a3a4a",textAlign:"center",padding:"60px 20px",fontSize:13}}>Sin registros. Presiona <strong style={{color:"#00e5a0"}}>↻ Actualizar</strong>.</div>
              :<div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,fontFamily:"monospace"}}>
                  <thead><tr>
                    {["Token","Precio COIN","Precio USD","1h %","24h %","Vol 24h","Fecha","Hora"].map(h=><th key={h} style={C.th}>{h}</th>)}
                  </tr></thead>
                  <tbody>
                    {histRecs.map((r,i)=>(
                      <tr key={i} style={{background:i%2===0?"#070b12":"#09101d"}}>
                        <td style={C.td}><span style={{marginRight:5}}>{r.em}</span><strong style={{color:"#e8f4ff"}}>{r.name}</strong></td>
                        <td style={{...C.td,color:"#00e5a0",fontWeight:"bold"}}>{r.price_coin>0?fmtNum(r.price_coin,4):"—"}</td>
                        <td style={{...C.td,color:"#3a6a5a"}}>{r.price_usd>0?"$"+fmtNum(r.price_usd):"—"}</td>
                        <td style={{...C.td,color:(r.chg_1h||0)>=0?"#00e5a0":"#ff6060"}}>{r.chg_1h!=null?(r.chg_1h>=0?"+":"")+r.chg_1h.toFixed(2)+"%":"—"}</td>
                        <td style={{...C.td,color:(r.chg_24h||0)>=0?"#00e5a0":"#ff6060"}}>{r.chg_24h!=null?(r.chg_24h>=0?"+":"")+r.chg_24h.toFixed(2)+"%":"—"}</td>
                        <td style={C.td}>{r.vol_24h>0?"$"+compact(r.vol_24h):"—"}</td>
                        <td style={{...C.td,color:"#445"}}>{fmtDate(r.ts)}</td>
                        <td style={{...C.td,color:"#00e5a0"}}>{fmtTime(r.ts)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            }
          </>
        )}

        {/* ══ CONFIG ══ */}
        {tab==="settings"&&(
          <div style={{display:"flex",flexDirection:"column",gap:14,maxWidth:700}}>
            <div style={{background:"#09101d",border:"1px solid #0e1e30",borderRadius:8,padding:18}}>
              <h3 style={{fontSize:11,color:"#5a9aaa",letterSpacing:2,textTransform:"uppercase",margin:"0 0 12px"}}>⏱ Auto-actualización</h3>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {[[0,"Manual"],[5,"5 min"],[15,"15 min"],[30,"30 min"],[60,"1 h"]].map(([v,l])=>(
                  <button key={v} onClick={()=>setAutoMin(v)}
                    style={{...C.btn,background:autoMin===v?"#0d2a1a":"#070b12",border:autoMin===v?"1px solid #00e5a0":"1px solid #0e1e30",color:autoMin===v?"#00e5a0":"#2a4050"}}>
                    {l}
                  </button>
                ))}
              </div>
              {autoMin>0&&<p style={{fontSize:11,color:"#2a4050",marginTop:8}}>✅ Auto-fetch activo cada <strong style={{color:"#00e5a0"}}>{autoMin} min</strong>. Mantén la pestaña abierta.</p>}
            </div>

            <div style={{background:"#09101d",border:"1px solid #0e1e30",borderRadius:8,padding:18}}>
              <h3 style={{fontSize:11,color:"#5a9aaa",letterSpacing:2,textTransform:"uppercase",margin:"0 0 12px"}}>🗄 Info</h3>
              {[["Tokens","34"],["Retención historial","72h (3 días)"],["Almacenamiento","localStorage"],["Red","Ronin Network"],["API","GeckoTerminal v2 (gratis)"],["Fuente addresses","RAWRTools + Defined.fi"]].map(([k,v])=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #0e1e30"}}>
                  <span style={{fontSize:12,color:"#445"}}>{k}</span>
                  <span style={{fontSize:12,color:"#7ecff0",fontFamily:"monospace"}}>{v}</span>
                </div>
              ))}
            </div>

            <div style={{background:"#09101d",border:"1px solid #0e1e30",borderRadius:8,padding:18}}>
              <h3 style={{fontSize:11,color:"#5a9aaa",letterSpacing:2,textTransform:"uppercase",margin:"0 0 12px"}}>🔐 Contraseña</h3>
              <p style={{fontSize:11,color:"#2a4050",lineHeight:1.8}}>
                Abrí el archivo <code style={{color:"#7ecff0"}}>index.html</code> con un editor y buscá:<br/>
                <code style={{color:"#00e5a0",display:"block",marginTop:6,padding:"6px 10px",background:"#070b12",borderRadius:4}}>const CW_PASSWORD = "craftworld2024";</code>
                Reemplazá por tu nueva contraseña y volvé a subir el archivo.
              </p>
            </div>

            <button onClick={()=>{if(confirm("¿Borrar TODOS los registros del historial?")){ setRecords([]); DB.set(RECORDS_KEY,[]); setStatus("🗑 Historial borrado."); }}}
              style={{...C.btn,background:"#2a0d0d",color:"#ff6b6b",border:"1px solid #ff3a3a40",padding:"10px 18px",alignSelf:"flex-start"}}>
              🗑 Borrar historial
            </button>
          </div>
        )}
      </main>
    </div>
  );
}

function Root() {
  const [authed,setAuthed]=useState(window._cwAuth.check());
  if(!authed) return <LoginScreen onAuth={()=>setAuthed(true)}/>;
  return <Tracker onLogout={()=>setAuthed(false)}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
