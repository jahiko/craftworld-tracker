  const CW_PASSWORD = "craftworld2024";
  function simpleHash(s){let h=0;for(let i=0;i<s.length;i++){h=Math.imul(31,h)+s.charCodeAt(i)|0;}return h.toString(36);}
  const SESSION_KEY="cw_v6";
  window._cwAuth={
    check:()=>sessionStorage.getItem(SESSION_KEY)===simpleHash(CW_PASSWORD),
    login:(pass)=>{if(simpleHash(pass)===simpleHash(CW_PASSWORD)){sessionStorage.setItem(SESSION_KEY,simpleHash(CW_PASSWORD));return true;}return false;}
  };

    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:20,animation:"fadeIn .5s ease"}}>

  );
}

const GT      = "https://api.geckoterminal.com/api/v2/networks/ronin/pools";
const REC_KEY = "cw_records_v10";
const THREE_D = 3*24*60*60*1000;
const DELAY   = 2000; // 2 segundos entre cada token — seguro para rate limit

const sleep   = ms=>new Promise(r=>setTimeout(r,ms));
const nowISO  = ()=>new Date().toISOString();
const fmtDate = iso=>new Date(iso).toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit",year:"numeric"});
const fmtTime = iso=>new Date(iso).toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
const purge   = arr=>arr.filter(r=>Date.now()-new Date(r.ts).getTime()<THREE_D);

function fmtN(n,d=4){
  if(!n&&n!==0) return "—";
  const f=parseFloat(n);
  if(!isFinite(f)||f===0) return "0";
  if(f<0.000001) return f.toExponential(3);
  if(f<1) return f.toPrecision(5);
  if(f<1000) return f.toFixed(d);
  return f.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
}
function cmpct(n){
  const f=parseFloat(n);
  if(!isFinite(f)||f<=0) return "—";
  if(f>=1e9) return (f/1e9).toFixed(2)+"B";
  if(f>=1e6) return (f/1e6).toFixed(2)+"M";
  if(f>=1e3) return (f/1e3).toFixed(2)+"K";
  return f.toFixed(2);
}
const DB={
  get(k,fb=null){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{
    try{localStorage.setItem(REC_KEY,JSON.stringify(purge(DB.get(REC_KEY,[]))));localStorage.setItem(k,JSON.stringify(v));}catch{}
  }}
};

// Fetch de un pool — espera hasta recibir respuesta válida, reintenta en 429
async function fetchPool(poolAddr){
  for(let intento=0; intento<5; intento++){
    try{
      const r = await fetch(`${GT}/${poolAddr}`,{
        headers:{Accept:"application/json;version=20230302"},
        signal:AbortSignal.timeout(20000)
      });
      if(r.status===429){
        // Rate limit — esperar y reintentar
        const espera = 3000*(intento+1);
        await sleep(espera);
        continue;
      }
      if(!r.ok) return null;
      const a = (await r.json())?.data?.attributes;
      if(!a) return null;
      return {
        price_usd: parseFloat(a.base_token_price_usd||0)||0,
        vol_24h:   parseFloat(a.volume_usd?.h24||0)||0,
        vol_1h:    parseFloat(a.volume_usd?.h1||0)||0,
        chg_24h:   parseFloat(a.price_change_percentage?.h24||0)||0,
        chg_1h:    parseFloat(a.price_change_percentage?.h1||0)||0,
        liquidity: parseFloat(a.reserve_in_usd||0)||0,
        fdv:       parseFloat(a.fdv_usd||0)||0,
        txs_24h:   (a.transactions?.h24?.buys||0)+(a.transactions?.h24?.sells||0),
      };
    }catch(e){
      if(intento<4) await sleep(2000);
    }
  }
  return null;
}

function Tracker({ onLogout }) {
  const [prices,    setPrices   ]=useState({});
  const [records,   setRecords  ]=useState([]);
  const [fetching,  setFetching ]=useState(false);
  const [curIdx,    setCurIdx   ]=useState(-1);   // índice del token que se está consultando
  const [lastFetch, setLastFetch]=useState(null);
  const [status,    setStatus   ]=useState("");
  const [ok,        setOk       ]=useState(0);
  const [tab,       setTab      ]=useState("dashboard");
  const [catFilter, setCatFilter]=useState("all");
  const [search,    setSearch   ]=useState("");
  const [autoMin,   setAutoMin  ]=useState(0);
  const [sortBy,    setSortBy   ]=useState("price_coin");
  const [filterHist,setFilterHist]=useState("all");
  const iRef=useRef(null);

  useEffect(()=>{
    const r=purge(DB.get(REC_KEY,[]));
    setRecords(r);
    const last={};
    r.slice().reverse().forEach(rec=>{ if(!last[rec.pool]) last[rec.pool]=rec; });
    if(Object.keys(last).length) setPrices(last);
  },[]);

  useEffect(()=>{
    if(iRef.current) clearInterval(iRef.current);
    if(autoMin>0) iRef.current=setInterval(doFetch,autoMin*60*1000);
    return()=>clearInterval(iRef.current);
  },[autoMin]);

  const doFetch=useCallback(async()=>{
    if(fetching) return;
    setFetching(true);
    setOk(0);
    setCurIdx(0);
    const ts = nowISO();
    const newPrices = {};
    let okCount = 0;

    // Ordenar: primero los que NO tienen datos, luego los que sí
    // Así en la siguiente actualización se priorizan los que fallaron
    const sinDatos = TOKENS.filter(t => !prices[t.pool]?.price_usd);
    const conDatos = TOKENS.filter(t =>  prices[t.pool]?.price_usd > 0);
    const ordenado = [...sinDatos, ...conDatos];

    for(let i=0; i<ordenado.length; i++){
      const t = ordenado[i];
      setCurIdx(i);
      const etiqueta = !prices[t.pool]?.price_usd ? "⚠️ sin datos" : "✓";
      setStatus(`${t.em} ${t.name} (${i+1}/${ordenado.length}) ${etiqueta}…`);

      const d = await fetchPool(t.pool);

      if(d){
        newPrices[t.pool] = d;
        okCount++;
        setOk(okCount);
        setPrices(prev=>({...prev,[t.pool]:d}));
      }

      if(i < ordenado.length-1){
        await sleep(DELAY);
      }
    }

    // Calcular price_coin y guardar historial
    const coinT   = TOKENS.find(t=>t.isCoin);
    const coinUsd = coinT && newPrices[coinT.pool]?.price_usd || 0;
    const newRecs = TOKENS.map(t=>{
      const d   = newPrices[t.pool]||null;
      const usd = d?.price_usd||0;
      const coin= t.isCoin ? 1 : (coinUsd>0&&usd>0 ? usd/coinUsd : 0);
      return {pool:t.pool,name:t.name,em:t.em,cat:t.cat,isCoin:t.isCoin,...(d||{}),price_usd:usd,price_coin:coin,coin_usd:coinUsd,ts};
    });

    const merged = purge([...records,...newRecs]);
    setRecords(merged);
    DB.set(REC_KEY,merged);
    setLastFetch(ts);
    setCurIdx(-1);
    setStatus(`✅ ${okCount}/${TOKENS.length} tokens OK · ${fmtDate(ts)} ${fmtTime(ts)}`);
    setFetching(false);
  },[fetching,records]);

  const coinUsd=(()=>{
    const ct=TOKENS.find(t=>t.isCoin);
    return ct&&(prices[ct.pool]?.price_usd||0)||0;
  })();

  const enrich=t=>{
    const p=prices[t.pool]||{};
    const usd=p.price_usd||0;
    const coin=t.isCoin?1:(coinUsd>0&&usd>0?usd/coinUsd:0);
    return {...t,price_usd:usd,price_coin:coin,
      chg_24h:p.chg_24h||0,chg_1h:p.chg_1h||0,
      vol_24h:p.vol_24h||0,liquidity:p.liquidity||0,
      fdv:p.fdv||0,txs_24h:p.txs_24h||0,hasData:usd>0};
  };
  const enriched=TOKENS.map(enrich);

  const visible=enriched
    .filter(t=>catFilter==="all"||t.cat===catFilter)
    .filter(t=>!search||t.name.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b)=>{
      if(sortBy==="chg_24h") return b.chg_24h-a.chg_24h;
      if(sortBy==="vol_24h") return b.vol_24h-a.vol_24h;
      if(a.isCoin) return -1; if(b.isCoin) return 1;
      return b.price_coin-a.price_coin;
    });

  const sinCoin  =enriched.filter(t=>!t.isCoin&&t.hasData);
  const top3Up   =sinCoin.slice().sort((a,b)=>b.chg_24h-a.chg_24h).slice(0,3);
  const top3Dn   =sinCoin.slice().sort((a,b)=>a.chg_24h-b.chg_24h).slice(0,3);
  const top3Vol  =sinCoin.slice().sort((a,b)=>b.vol_24h-a.vol_24h).slice(0,3);
  const top3Price=sinCoin.slice().sort((a,b)=>b.price_coin-a.price_coin).slice(0,3);
  const histRecs =(filterHist==="all"?records:records.filter(r=>r.name===filterHist)).slice().reverse();
  const pct      =curIdx>=0?Math.round((curIdx)/TOKENS.length*100):fetching?99:0;

  const exportCSV=()=>{
    const hdr=["Token","Cat","Precio COIN","Precio USD","1h%","24h%","Vol24h","Liquidez","Txs","Fecha","Hora"];
    const rows=histRecs.map(r=>[r.name,r.cat,r.price_coin||"",r.price_usd||"",r.chg_1h||"",r.chg_24h||"",
      r.vol_24h||"",r.liquidity||"",r.txs_24h||"",fmtDate(r.ts),fmtTime(r.ts)].join(",")).join("\n");
    const blob=new Blob(["\uFEFF"+hdr.join(",")+"\n"+rows],{type:"text/csv;charset=utf-8;"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download=`craftworld_${new Date().toISOString().slice(0,16).replace(/[:T]/g,"_")}.csv`; a.click();
  };

  const C={
    btn:{padding:"8px 16px",borderRadius:5,border:"none",fontSize:12,fontFamily:"'Courier New',monospace"},
    th:{background:"#09101d",color:"#2a4a5a",padding:"8px 10px",textAlign:"left",borderBottom:"1px solid #0e1e30",textTransform:"uppercase",letterSpacing:1,fontSize:9,whiteSpace:"nowrap"},
    td:{padding:"7px 10px",whiteSpace:"nowrap",fontSize:11},
  };
  const CC={base:"#00e5a0",elemento:"#6080ff",tierra:"#c87040",agua:"#4080c0",fuego:"#ff6040",especial:"#c040c0"};
  const CB={base:"#0d2a1a",elemento:"#0d0d2a",tierra:"#2a1a0a",agua:"#0a1a2a",fuego:"#2a0a0a",especial:"#1a0a2a"};

  // Tiempo estimado restante
  const secsLeft = curIdx>=0 ? Math.round((TOKENS.length-curIdx)*DELAY/1000) : 0;

  return (
    <div>
      <header style={{display:"flex",alignItems:"center",gap:12,padding:"12px 20px",background:"#09101d",borderBottom:"1px solid #0e1e30",flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:34,animation:"glowHex 4s ease infinite"}}>⬡</span>
          <div>
            <div style={{fontSize:14,fontWeight:"bold",color:"#e8f4ff",letterSpacing:4}}>CRAFT WORLD</div>
            <div style={{fontSize:8,color:"#00e5a070",letterSpacing:4}}>RONIN · PRICE TRACKER</div>
          </div>
        </div>
        <div style={{flex:1,minWidth:200}}>
          {fetching?(
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <div style={{position:"relative",background:"#0c1a28",border:"1px solid #152840",borderRadius:5,height:22}}>
                <div style={{position:"absolute",inset:"0 auto 0 0",width:pct+"%",background:"linear-gradient(90deg,#00e5a0,#00c8ff)",borderRadius:5,transition:"width .8s ease"}}/>
                <span style={{position:"absolute",width:"100%",textAlign:"center",top:3,fontSize:9,color:"#fff",mixBlendMode:"difference"}}>
                  {curIdx+1}/{TOKENS.length} tokens · {ok} ok · ~{secsLeft}s restantes
                </span>
              </div>
              <div style={{fontSize:9,color:"#2a5a4a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{status}</div>
            </div>
          ):(
            coinUsd>0&&<div style={{fontSize:11,color:"#00e5a070"}}>🪙 1 COIN = <strong style={{color:"#00e5a0"}}>${fmtN(coinUsd,8)}</strong></div>
          )}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          {lastFetch&&!fetching&&<span style={{fontSize:9,color:"#2a3a4a"}}>🕐 {fmtDate(lastFetch)} {fmtTime(lastFetch)}</span>}
          <button onClick={doFetch} disabled={fetching}
            style={{...C.btn,background:"#0d2a1a",color:"#00e5a0",border:"1px solid #00e5a030",fontWeight:"bold"}}>
            {fetching?"⏳ Cargando…":"↻ Actualizar"}
          </button>
          <button onClick={()=>{sessionStorage.clear();onLogout();}} style={{...C.btn,background:"#1a0d0d",color:"#ff6060",border:"1px solid #ff303020"}}>⎋ Salir</button>
        </div>
      </header>

      {!fetching&&status&&<div style={{background:"#050e0a",borderBottom:"1px solid #0c2016",padding:"5px 20px",fontSize:11,color:"#00e5a0",animation:"slideDown .3s ease"}}>{status}</div>}

      <nav style={{display:"flex",alignItems:"center",background:"#09101d",borderBottom:"1px solid #0e1e30",padding:"0 12px",overflowX:"auto"}}>
        {[["dashboard","📊 Dashboard"],["resumen","⚡ Resumen"],["history","📋 Historial"],["settings","⚙ Config"]].map(([id,lbl])=>(
          <button key={id} onClick={()=>setTab(id)}
            style={{background:"none",border:"none",color:tab===id?"#00e5a0":"#2a3a4a",padding:"10px 14px",fontSize:11,letterSpacing:1,borderBottom:tab===id?"2px solid #00e5a0":"2px solid transparent",transition:"all .2s",whiteSpace:"nowrap"}}>
            {lbl}
          </button>
        ))}
        <span style={{flex:1}}/>
        <span style={{fontSize:9,color:"#111820",whiteSpace:"nowrap"}}>{TOKENS.length} tokens · {DELAY/1000}s/token · GeckoTerminal</span>
      </nav>

      <main style={{padding:"16px 16px 48px",maxWidth:1400,margin:"0 auto"}}>

        {tab==="dashboard"&&(<>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:10,marginBottom:14}}>
            {[["Tokens",TOKENS.length],["Con datos",enriched.filter(t=>t.hasData).length],["1 COIN",coinUsd>0?"$"+fmtN(coinUsd,8):"—"],["Registros",records.length],["Actualizado",lastFetch?fmtTime(lastFetch):"—"]].map(([l,v])=>(
              <div key={l} style={{background:"#09101d",border:"1px solid #0e1e30",borderRadius:7,padding:"11px 13px"}}>
                <span style={{display:"block",fontSize:18,fontWeight:"bold",color:"#e8f4ff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{v}</span>
                <span style={{display:"block",fontSize:8,color:"#2a3a4a",textTransform:"uppercase",letterSpacing:1,marginTop:2}}>{l}</span>
              </div>
            ))}
          </div>

          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12,alignItems:"center"}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Buscar token…"
              style={{background:"#09101d",border:"1px solid #0e1e30",color:"#b0c4d8",padding:"7px 12px",borderRadius:5,fontFamily:"monospace",fontSize:11,minWidth:160}}/>
            <select value={catFilter} onChange={e=>setCatFilter(e.target.value)}
              style={{background:"#09101d",border:"1px solid #0e1e30",color:"#b0c4d8",padding:"7px 10px",borderRadius:5,fontFamily:"monospace",fontSize:11}}>
              {[["all","Todos"],["base","🪙 Base"],["elemento","🌊 Elementos"],["tierra","🌍 Tierra"],["agua","💧 Agua"],["fuego","🔥 Fuego"],["especial","⭐ Especiales"]].map(([k,v])=><option key={k} value={k}>{v}</option>)}
            </select>
            <select value={sortBy} onChange={e=>setSortBy(e.target.value)}
              style={{background:"#09101d",border:"1px solid #0e1e30",color:"#b0c4d8",padding:"7px 10px",borderRadius:5,fontFamily:"monospace",fontSize:11}}>
              <option value="price_coin">Precio COIN ↓</option>
              <option value="chg_24h">Cambio 24h ↓</option>
              <option value="vol_24h">Volumen 24h ↓</option>
            </select>
            <span style={{fontSize:10,color:"#2a3545",marginLeft:"auto"}}>{visible.length} tokens</span>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10}}>
            {visible.map((t,vi)=>{
              const isUp=t.chg_24h>=0;
              const isCurrent = fetching && TOKENS.findIndex(tk=>tk.pool===t.pool)===curIdx;
              return (
                <div key={t.pool} className="pool-card"
                  style={{background:"#09101d",border:`1px solid ${isCurrent?"#00e5a050":"#0e1e30"}`,borderRadius:7,padding:12,display:"flex",flexDirection:"column",gap:5,
                    transition:"border-color .3s"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:20}}>{t.em}</span>
                    <span style={{fontWeight:"bold",color:"#e8f4ff",fontSize:13}}>{t.name}</span>
                    {isCurrent&&<span style={{fontSize:8,color:"#00e5a0",animation:"glowHex 1s infinite",marginLeft:4}}>↻</span>}
                    <span style={{marginLeft:"auto",fontSize:8,background:CB[t.cat]||"#0e1e30",color:CC[t.cat]||"#5a8a9a",padding:"2px 6px",borderRadius:3,textTransform:"uppercase",letterSpacing:1}}>{t.cat}</span>
                  </div>
                  {t.hasData?(
                    <>
                      <div style={{display:"flex",flexDirection:"column",gap:2}}>
                        <span style={{fontSize:16,fontWeight:"bold",color:"#00e5a0"}}>
                          {t.isCoin?`$${fmtN(t.price_usd,8)}`:`${fmtN(t.price_coin,4)} COIN`}
                        </span>
                        <span style={{fontSize:10,color:"#3a5a6a"}}>
                          {t.isCoin?"DynoCoin · Ronin":`$${fmtN(t.price_usd,6)}`}
                        </span>
                      </div>
                      <div style={{display:"flex",gap:6,alignItems:"center"}}>
                        <span style={{fontSize:11,fontWeight:"bold",color:isUp?"#00e5a0":"#ff6060"}}>{isUp?"▲":"▼"} {Math.abs(t.chg_24h).toFixed(2)}%</span>
                        <span style={{fontSize:9,color:"#2a3545"}}>24h</span>
                        {t.chg_1h!==0&&<span style={{fontSize:9,color:t.chg_1h>=0?"#00a070":"#cc4040",marginLeft:"auto"}}>{t.chg_1h>=0?"+":""}{t.chg_1h.toFixed(2)}% 1h</span>}
                      </div>
                      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                        {t.vol_24h>0&&<span style={{fontSize:9,color:"#2a4a5a",background:"#0c1520",padding:"2px 5px",borderRadius:3}}>Vol: ${cmpct(t.vol_24h)}</span>}
                        {t.liquidity>0&&<span style={{fontSize:9,color:"#2a4a5a",background:"#0c1520",padding:"2px 5px",borderRadius:3}}>Liq: ${cmpct(t.liquidity)}</span>}
                        {t.txs_24h>0&&<span style={{fontSize:9,color:"#2a4a5a",background:"#0c1520",padding:"2px 5px",borderRadius:3}}>{t.txs_24h} txs</span>}
                      </div>
                    </>
                  ):(
                    <div style={{fontSize:10,padding:"8px 0",fontStyle:"italic",
                      color:isCurrent?"#00e5a060":fetching&&TOKENS.findIndex(tk=>tk.pool===t.pool)>curIdx?"#1a3a2a":"#1e3040"}}>
                      {isCurrent?"↻ Consultando…":fetching&&TOKENS.findIndex(tk=>tk.pool===t.pool)>curIdx?"⏳ En cola…":"Sin datos"}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </>)}

        {tab==="resumen"&&(
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
            {[
              {title:"🚀 Mayores subidas 24h", items:top3Up,   color:"#00e5a0", val:t=>`${t.chg_24h>=0?"+":""}${t.chg_24h.toFixed(2)}%`},
              {title:"💀 Mayores bajas 24h",   items:top3Dn,   color:"#ff6060", val:t=>`${t.chg_24h.toFixed(2)}%`},
              {title:"📦 Más volumen 24h",     items:top3Vol,  color:"#7ecff0", val:t=>`$${cmpct(t.vol_24h)}`},
              {title:"👑 Más caros en COIN",   items:top3Price,color:"#c8a040", val:t=>`${fmtN(t.price_coin,4)} COIN`},
            ].map(({title,items,color,val})=>(
              <div key={title} style={{background:"#09101d",border:"1px solid #0e1e30",borderRadius:10,padding:16}}>
                <div style={{fontSize:12,color:"#5a8aaa",letterSpacing:1,marginBottom:12,fontWeight:"bold"}}>{title}</div>
                {items.length===0?<div style={{color:"#1e3040",fontSize:11}}>Sin datos — presiona Actualizar</div>
                :items.map((t,i)=>(
                  <div key={t.pool} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:i<items.length-1?"1px solid #0e1e30":"none"}}>
                    <span style={{fontSize:10,color:"#2a3545",width:16}}>{i+1}.</span>
                    <span style={{fontSize:20}}>{t.em}</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,fontWeight:"bold",color:"#e8f4ff"}}>{t.name}</div>
                      <div style={{fontSize:10,color:"#3a5a6a"}}>{fmtN(t.price_coin,4)} COIN · ${fmtN(t.price_usd,6)}</div>
                    </div>
                    <span style={{fontSize:12,fontWeight:"bold",color}}>{val(t)}</span>
                  </div>
                ))}
              </div>
            ))}
            <div style={{gridColumn:"1/-1",background:"#09101d",border:"1px solid #0e1e30",borderRadius:10,padding:16,overflowX:"auto"}}>
              <div style={{fontSize:12,color:"#5a8aaa",letterSpacing:1,marginBottom:12,fontWeight:"bold"}}>📊 Todos los tokens — precio mayor a menor</div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                <thead><tr>{["#","Token","Cat","Precio COIN","Precio USD","1h %","24h %","Vol 24h","Liquidez","Txs"].map(h=><th key={h} style={C.th}>{h}</th>)}</tr></thead>
                <tbody>
                  {enriched.filter(t=>!t.isCoin).slice().sort((a,b)=>b.price_coin-a.price_coin).map((t,i)=>(
                    <tr key={t.pool} style={{background:i%2===0?"#070b12":"#09101d"}}>
                      <td style={{...C.td,color:"#2a3545"}}>{i+1}</td>
                      <td style={C.td}><span style={{marginRight:6}}>{t.em}</span><strong style={{color:"#e8f4ff"}}>{t.name}</strong></td>
                      <td style={C.td}><span style={{fontSize:8,background:CB[t.cat],color:CC[t.cat],padding:"2px 5px",borderRadius:3}}>{t.cat}</span></td>
                      <td style={{...C.td,color:"#00e5a0",fontWeight:"bold"}}>{t.hasData?fmtN(t.price_coin,4):"—"}</td>
                      <td style={{...C.td,color:"#3a6a5a"}}>{t.hasData?"$"+fmtN(t.price_usd,6):"—"}</td>
                      <td style={{...C.td,color:t.chg_1h>=0?"#00e5a0":"#ff6060"}}>{t.hasData?(t.chg_1h>=0?"+":"")+t.chg_1h.toFixed(2)+"%":"—"}</td>
                      <td style={{...C.td,color:t.chg_24h>=0?"#00e5a0":"#ff6060"}}>{t.hasData?(t.chg_24h>=0?"+":"")+t.chg_24h.toFixed(2)+"%":"—"}</td>
                      <td style={C.td}>{t.vol_24h>0?"$"+cmpct(t.vol_24h):"—"}</td>
                      <td style={C.td}>{t.liquidity>0?"$"+cmpct(t.liquidity):"—"}</td>
                      <td style={C.td}>{t.txs_24h>0?t.txs_24h:"—"}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {tab==="history"&&(<>
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12,flexWrap:"wrap"}}>
            <select value={filterHist} onChange={e=>setFilterHist(e.target.value)}
              style={{background:"#09101d",border:"1px solid #0e1e30",color:"#b0c4d8",padding:"7px 10px",borderRadius:5,fontFamily:"monospace",fontSize:11}}>
              <option value="all">Todos los tokens</option>
              {TOKENS.map(t=><option key={t.pool} value={t.name}>{t.em} {t.name}</option>)}
            </select>
            <button onClick={exportCSV} style={{...C.btn,background:"#0d2a1a",color:"#00e5a0",border:"1px solid #00e5a030"}}>⬇ CSV</button>
            <span style={{fontSize:10,color:"#2a3a4a",marginLeft:"auto"}}>{histRecs.length} registros</span>
          </div>
          {histRecs.length===0
            ?<div style={{color:"#2a3a4a",textAlign:"center",padding:"60px 20px",fontSize:13}}>Sin registros. Presiona <strong style={{color:"#00e5a0"}}>↻ Actualizar</strong>.</div>
            :<div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,fontFamily:"monospace"}}>
                <thead><tr>{["Token","Precio COIN","Precio USD","1h%","24h%","Vol 24h","Liquidez","Txs","Fecha","Hora"].map(h=><th key={h} style={C.th}>{h}</th>)}</tr></thead>
                <tbody>
                  {histRecs.map((r,i)=>(
                    <tr key={i} style={{background:i%2===0?"#070b12":"#09101d"}}>
                      <td style={C.td}><span style={{marginRight:5}}>{r.em}</span><strong style={{color:"#e8f4ff"}}>{r.name}</strong></td>
                      <td style={{...C.td,color:"#00e5a0",fontWeight:"bold"}}>{r.isCoin?`$${fmtN(r.price_usd,8)}`:(r.price_coin>0?fmtN(r.price_coin,4):"—")}</td>
                      <td style={{...C.td,color:"#3a6a5a"}}>{r.price_usd>0?"$"+fmtN(r.price_usd,6):"—"}</td>
                      <td style={{...C.td,color:(r.chg_1h||0)>=0?"#00e5a0":"#ff6060"}}>{r.chg_1h?(r.chg_1h>=0?"+":"")+r.chg_1h.toFixed(2)+"%":"—"}</td>
                      <td style={{...C.td,color:(r.chg_24h||0)>=0?"#00e5a0":"#ff6060"}}>{r.chg_24h?(r.chg_24h>=0?"+":"")+r.chg_24h.toFixed(2)+"%":"—"}</td>
                      <td style={C.td}>{r.vol_24h>0?"$"+cmpct(r.vol_24h):"—"}</td>
                      <td style={C.td}>{r.liquidity>0?"$"+cmpct(r.liquidity):"—"}</td>
                      <td style={C.td}>{r.txs_24h>0?r.txs_24h:"—"}</td>
                      <td style={{...C.td,color:"#445"}}>{fmtDate(r.ts)}</td>
                      <td style={{...C.td,color:"#00e5a0"}}>{fmtTime(r.ts)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          }
        </>)}

        {tab==="settings"&&(
          <div style={{display:"flex",flexDirection:"column",gap:14,maxWidth:700}}>
            <div style={{background:"#09101d",border:"1px solid #0e1e30",borderRadius:8,padding:18}}>
              <h3 style={{fontSize:11,color:"#5a9aaa",letterSpacing:2,textTransform:"uppercase",margin:"0 0 12px"}}>⏱ Auto-actualización</h3>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {[[0,"Manual"],[15,"15 min"],[30,"30 min"],[60,"1 h"],[120,"2 h"]].map(([v,l])=>(
                  <button key={v} onClick={()=>setAutoMin(v)}
                    style={{...C.btn,background:autoMin===v?"#0d2a1a":"#070b12",border:autoMin===v?"1px solid #00e5a0":"1px solid #0e1e30",color:autoMin===v?"#00e5a0":"#2a4050"}}>
                    {l}
                  </button>
                ))}
              </div>
              {autoMin>0&&<p style={{fontSize:11,color:"#2a4050",marginTop:8}}>✅ Auto-fetch cada <strong style={{color:"#00e5a0"}}>{autoMin} min</strong>. Mantén la pestaña abierta.</p>}
            </div>
            <div style={{background:"#09101d",border:"1px solid #0e1e30",borderRadius:8,padding:18}}>
              <h3 style={{fontSize:11,color:"#5a9aaa",letterSpacing:2,textTransform:"uppercase",margin:"0 0 12px"}}>🗄 Info técnica</h3>
              {[
                ["API","GeckoTerminal /pools/{addr} (CORS ✅)"],
                ["Estrategia","1 token por request, secuencial"],
                ["Delay entre tokens",""+DELAY+"ms (respeta rate limit 30/min)"],
                ["Reintento en 429","Hasta 5x con backoff progresivo"],
                ["Tiempo total estimado",`~${Math.round(TOKENS.length*DELAY/1000)}s`],
                ["Tokens",""+TOKENS.length],
                ["Retención historial","72h (3 días)"],
                ["Fuente addresses","RAWRTools · Defined.fi"],
              ].map(([k,v])=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #0e1e30"}}>
                  <span style={{fontSize:12,color:"#445"}}>{k}</span>
                  <span style={{fontSize:12,color:"#7ecff0",fontFamily:"monospace"}}>{v}</span>
                </div>
              ))}
            </div>
            <div style={{background:"#09101d",border:"1px solid #0e1e30",borderRadius:8,padding:18}}>
              <h3 style={{fontSize:11,color:"#5a9aaa",letterSpacing:2,textTransform:"uppercase",margin:"0 0 12px"}}>🔐 Contraseña</h3>
              <p style={{fontSize:11,color:"#2a4050",lineHeight:1.8}}>
                Abrí <code style={{color:"#7ecff0"}}>index.html</code> con un editor y cambiá:<br/>
                <code style={{color:"#00e5a0",display:"block",marginTop:6,padding:"6px 10px",background:"#070b12",borderRadius:4}}>const CW_PASSWORD = "craftworld2024";</code>
              </p>
            </div>
            <button onClick={()=>{if(confirm("¿Borrar TODOS los registros?")){setRecords([]);DB.set(REC_KEY,[]);setStatus("🗑 Historial borrado.");}}}
              style={{...C.btn,background:"#2a0d0d",color:"#ff6b6b",border:"1px solid #ff3a3a40",padding:"10px 18px",alignSelf:"flex-start"}}>
              🗑 Borrar historial
            </button>
          </div>
        )}
      </main>
    </div>
  );
}

function Root() {
  const [authed,setAuthed]=useState(window._cwAuth.check());
  if(!authed) return <LoginScreen onAuth={()=>setAuthed(true)}/>;
  return <Tracker onLogout={()=>setAuthed(false)}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
