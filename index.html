<script>
  const CW_PASSWORD = "craftworld2024";   // <── CAMBIA ESTO

  // Hash simple para no guardar la contraseña en texto plano en sessionStorage
  function simpleHash(s){
    let h=0;
    for(let i=0;i<s.length;i++){h=Math.imul(31,h)+s.charCodeAt(i)|0;}
    return h.toString(36);
  }

  const EXPECTED   = simpleHash(CW_PASSWORD);
  const SESSION_KEY= "cw_session_v1";

  window._cwAuth = {
    check: () => sessionStorage.getItem(SESSION_KEY) === EXPECTED,
    login: (pass) => {
      if(simpleHash(pass) === EXPECTED){
        sessionStorage.setItem(SESSION_KEY, EXPECTED);
        return true;
      }
      return false;
    }
  };
</script>

/* ════════════════════════════════════════════════════════
   PANTALLA DE LOGIN
════════════════════════════════════════════════════════ */
function LoginScreen({ onAuth }) {
  const [pass, setPass]   = useState("");
  const [error, setError] = useState(false);
  const [shake, setShake] = useState(false);
  const inputRef = useRef(null);

  useEffect(()=>{ inputRef.current?.focus(); },[]);

  const attempt = () => {
    if(window._cwAuth.login(pass)){
      onAuth();
    } else {
      setError(true);
      setShake(true);
      setPass("");
      setTimeout(()=>setShake(false), 500);
      setTimeout(()=>inputRef.current?.focus(), 100);
    }
  };

  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",padding:20,animation:"fadeIn .5s ease"}}>
      <div style={{
        width:"100%",maxWidth:360,background:"#09101d",
        border:"1px solid #0e1e30",borderRadius:14,padding:"40px 32px",
        display:"flex",flexDirection:"column",alignItems:"center",gap:22,
        animation: shake ? "shake .45s ease" : "none",
      }}>
        <div style={{fontSize:60,animation:"glowHex 3s ease infinite"}}>⬡</div>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:16,fontWeight:"bold",color:"#e8f4ff",letterSpacing:5}}>CRAFT WORLD</div>
          <div style={{fontSize:9,color:"#00e5a070",letterSpacing:5,marginTop:4}}>PRICE TRACKER · PRIVADO</div>
        </div>

        {error && (
          <div style={{background:"#2a0d0d",border:"1px solid #ff3a3a40",color:"#ff6060",fontSize:11,padding:"8px 14px",borderRadius:5,width:"100%",textAlign:"center",animation:"slideDown .3s ease"}}>
            ⚠ Contraseña incorrecta
          </div>
        )}

        <div style={{width:"100%",display:"flex",flexDirection:"column",gap:8}}>
          <label style={{fontSize:10,color:"#2a4a5a",textTransform:"uppercase",letterSpacing:1}}>Contraseña</label>
          <input ref={inputRef} type="password" value={pass}
            onChange={e=>{setPass(e.target.value);setError(false);}}
            onKeyDown={e=>e.key==="Enter"&&attempt()}
            placeholder="••••••••"
            style={{width:"100%",background:"#070b12",border:`1px solid ${error?"#ff3a3a60":"#0e1e30"}`,color:"#e8f4ff",padding:"12px 14px",borderRadius:6,fontFamily:"'Courier New',monospace",fontSize:16,letterSpacing:4}}/>

        </button>

    </div>
  );
}

const THREE_DAYS_MS = 3*24*60*60*1000;
const RECORDS_KEY   = "cw_records_v3";
const META_KEY      = "cw_meta_v3";
const GT_API        = "https://api.geckoterminal.com/api/v2/networks/ronin/pools";

const nowISO   = ()  => new Date().toISOString();
const short    = a   => a.slice(0,6)+"…"+a.slice(-4);
const fmtDate  = iso => new Date(iso).toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit",year:"numeric"});
const fmtTime  = iso => new Date(iso).toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
const purgeOld = arr => arr.filter(r=>Date.now()-new Date(r.timestamp).getTime()<THREE_DAYS_MS);
const sleep    = ms  => new Promise(r=>setTimeout(r,ms));

function formatNum(n){
  if(n==null) return "—";
  const f=parseFloat(n);
  if(!isFinite(f)) return "—";
  if(f===0) return "0";
  if(f<0.00001) return f.toExponential(4);
  if(f<1)       return f.toPrecision(5);
  if(f<1000)    return f.toFixed(4);
  return f.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
}
function compactNum(n){
  const f=parseFloat(n);
  if(!isFinite(f)) return "—";
  if(f>=1e9) return (f/1e9).toFixed(2)+"B";
  if(f>=1e6) return (f/1e6).toFixed(2)+"M";
  if(f>=1e3) return (f/1e3).toFixed(2)+"K";
  return f.toFixed(2);
}

const DB = {
  get(key,fb=null){
    try{const v=localStorage.getItem(key);return v?JSON.parse(v):fb;}catch{return fb;}
  },
  set(key,val){
    try{localStorage.setItem(key,JSON.stringify(val));}
    catch{
      try{
        const r=JSON.parse(localStorage.getItem(RECORDS_KEY)||"[]");
        localStorage.setItem(RECORDS_KEY,JSON.stringify(purgeOld(r)));
        localStorage.setItem(key,JSON.stringify(val));
      }catch{}
    }
  },
};

async function fetchPool(address){
  try{
    const res=await fetch(`${GT_API}/${address}`,{
      headers:{Accept:"application/json;version=20230302"},
      signal:AbortSignal.timeout(12000),
    });
    if(res.status===429) return {error:"Rate limit 429",attrs:null};
    if(!res.ok)          return {error:`HTTP ${res.status}`,attrs:null};
    const json=await res.json();
    const a=json?.data?.attributes;
    if(!a) return {error:"Sin atributos",attrs:null};
    return {error:null,attrs:a};
  }catch(e){
    return {error:e.name==="TimeoutError"?"Timeout":e.message,attrs:null};
  }
}

/* ════════════════════════════════════════════════════════
   TRACKER PRINCIPAL
════════════════════════════════════════════════════════ */
function Tracker({ onLogout }) {
  const [records,    setRecords   ]=useState([]);
  const [poolMeta,   setPoolMeta  ]=useState({});
  const [tab,        setTab       ]=useState("dashboard");
  const [filterPool, setFilterPool]=useState("all");
  const [fetching,   setFetching  ]=useState(false);
  const [prog,       setProg      ]=useState({done:0,total:0});
  const [autoMin,    setAutoMin   ]=useState(0);
  const [lastFetch,  setLastFetch ]=useState(null);
  const [status,     setStatus    ]=useState("");
  const [loading,    setLoading   ]=useState(true);
  const [search,     setSearch    ]=useState("");
  const iRef=useRef(null);

  useEffect(()=>{
    const r=DB.get(RECORDS_KEY,[]);
    const m=DB.get(META_KEY,{});
    const clean=purgeOld(r);
    setRecords(clean); setPoolMeta(m);
    if(clean.length!==r.length) DB.set(RECORDS_KEY,clean);
    setLoading(false);
  },[]);

  useEffect(()=>{
    if(iRef.current) clearInterval(iRef.current);
    if(autoMin>0) iRef.current=setInterval(()=>doFetchAll(),autoMin*60*1000);
    return ()=>clearInterval(iRef.current);
  },[autoMin,records,poolMeta]);

  const doFetchAll=useCallback(async()=>{
    if(fetching) return;
    setFetching(true); setProg({done:0,total:POOLS.length}); setStatus("Consultando GeckoTerminal…");
    const ts=nowISO();
    const newMeta={...poolMeta};
    const newRecs=[];
    for(let i=0;i<POOLS.length;i++){
      const pool=POOLS[i];
      const {error,attrs}=await fetchPool(pool.address);
      setProg({done:i+1,total:POOLS.length});
      if(attrs){
        const nm=attrs.name||short(pool.address);
        newMeta[pool.address]={name:nm,base:nm.split(" / ")[0]||"T0",quote:nm.split(" / ")[1]||"T1"};
        newRecs.push({
          poolId:pool.id, address:pool.address, name:nm,
          baseToken:nm.split(" / ")[0]||"T0", quoteToken:nm.split(" / ")[1]||"T1",
          basePriceUsd:  attrs.base_token_price_usd||null,
          quotePriceUsd: attrs.quote_token_price_usd||null,
          priceNative:   attrs.base_token_price_native_currency||null,
          volume1h:      attrs.volume_usd?.h1||null,
          volume6h:      attrs.volume_usd?.h6||null,
          volume24h:     attrs.volume_usd?.h24||null,
          liquidity:     attrs.reserve_in_usd||null,
          fdv:           attrs.fdv_usd||null,
          mktCap:        attrs.market_cap_usd||null,
          chg5m:         attrs.price_change_percentage?.m5||null,
          chg1h:         attrs.price_change_percentage?.h1||null,
          chg6h:         attrs.price_change_percentage?.h6||null,
          chg24h:        attrs.price_change_percentage?.h24||null,
          txBuys24h:     attrs.transactions?.h24?.buys||null,
          txSells24h:    attrs.transactions?.h24?.sells||null,
          txTotal24h:    ((attrs.transactions?.h24?.buys||0)+(attrs.transactions?.h24?.sells||0))||null,
          timestamp:ts, error:null,
        });
      } else {
        newRecs.push({
          poolId:pool.id,address:pool.address,
          name:newMeta[pool.address]?.name||short(pool.address),
          basePriceUsd:null,quotePriceUsd:null,timestamp:ts,error,
        });
      }
      if(i<POOLS.length-1) await sleep(250);
    }
    const merged=purgeOld([...records,...newRecs]);
    setRecords(merged); setPoolMeta(newMeta);
    DB.set(RECORDS_KEY,merged); DB.set(META_KEY,newMeta);
    setLastFetch(ts);
    const ok=newRecs.filter(r=>r.basePriceUsd!=null).length;
    setStatus(`✅ ${ok}/${POOLS.length} pools OK · ${fmtDate(ts)} ${fmtTime(ts)}`);
    setFetching(false);
  },[fetching,records,poolMeta]);

  const latestByPool=POOLS.map(pool=>{
    const recs=records.filter(r=>r.poolId===pool.id).slice().reverse();
    return {pool,latest:recs[0]||null,meta:poolMeta[pool.address],count:recs.length};
  });

  const filteredRecs=(filterPool==="all"?records:records.filter(r=>r.poolId===filterPool)).slice().reverse();

  const visiblePools=latestByPool.filter(({pool,meta})=>{
    if(!search) return true;
    const q=search.toLowerCase();
    return (meta?.name||"").toLowerCase().includes(q)||pool.address.includes(q);
  });

  const exportCSV=()=>{
    const hdr=["Pool","Dirección","Token Base","Token Quote",
      "Precio Base (USD)","Precio Quote (USD)","Precio Nativo",
      "Vol 1h (USD)","Vol 6h (USD)","Vol 24h (USD)","Liquidez (USD)","FDV (USD)","Mkt Cap (USD)",
      "Cambio 5m %","Cambio 1h %","Cambio 6h %","Cambio 24h %",
      "Compras 24h","Ventas 24h","Txs Total 24h","Fecha","Hora","Error"];
    const body=filteredRecs.map(r=>[
      `"${r.name||""}"`,r.address,`"${r.baseToken||""}"`,`"${r.quoteToken||""}"`,
      r.basePriceUsd||"",r.quotePriceUsd||"",r.priceNative||"",
      r.volume1h||"",r.volume6h||"",r.volume24h||"",r.liquidity||"",r.fdv||"",r.mktCap||"",
      r.chg5m||"",r.chg1h||"",r.chg6h||"",r.chg24h||"",
      r.txBuys24h||"",r.txSells24h||"",r.txTotal24h||"",
      fmtDate(r.timestamp),fmtTime(r.timestamp),`"${r.error||""}"`,
    ].join(",")).join("\n");
    const blob=new Blob(["\uFEFF"+hdr.join(",")+"\n"+body],{type:"text/csv;charset=utf-8;"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`craftworld_${new Date().toISOString().slice(0,16).replace("T","_").replace(":","-")}.csv`;
    a.click();
  };

  const pct=prog.total>0?Math.round(prog.done/prog.total*100):0;

  if(loading) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:16}}>
      <div style={{fontSize:72,animation:"glowHex 1.5s ease infinite"}}>⬡</div>
      <p style={{color:"#2a3a4a",fontSize:13,letterSpacing:3}}>Cargando…</p>
    </div>
  );

  const C = {
    btn: {padding:"8px 16px",borderRadius:5,border:"none",fontSize:12,fontFamily:"'Courier New',monospace"},
    th:  {background:"#09101d",color:"#2a4a5a",padding:"8px 10px",textAlign:"left",borderBottom:"1px solid #0e1e30",textTransform:"uppercase",letterSpacing:1,fontSize:9,whiteSpace:"nowrap"},
    td:  {padding:"7px 10px",whiteSpace:"nowrap",fontSize:11},
  };

  return (
    <div>
      {/* HEADER */}
      <header style={{display:"flex",alignItems:"center",gap:12,padding:"12px 20px",background:"#09101d",borderBottom:"1px solid #0e1e30",flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:34,animation:"glowHex 4s ease infinite"}}>⬡</span>
          <div>
            <div style={{fontSize:14,fontWeight:"bold",color:"#e8f4ff",letterSpacing:4}}>CRAFT WORLD</div>
            <div style={{fontSize:8,color:"#00e5a070",letterSpacing:4}}>RONIN · PRICE TRACKER</div>
          </div>
        </div>

        <div style={{flex:1,minWidth:180}}>
          {fetching&&(
            <div style={{position:"relative",background:"#0c1a28",border:"1px solid #152840",borderRadius:5,height:22}}>
              <div style={{position:"absolute",inset:"0 auto 0 0",width:pct+"%",background:"linear-gradient(90deg,#00e5a0,#00c8ff)",borderRadius:5,transition:"width .4s"}}/>
              <span style={{position:"absolute",width:"100%",textAlign:"center",top:3,fontSize:9,color:"#fff",mixBlendMode:"difference"}}>{prog.done}/{prog.total} · {pct}%</span>
            </div>

        </div>

        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {lastFetch&&!fetching&&<span style={{fontSize:9,color:"#2a3a4a"}}>🕐 {fmtDate(lastFetch)} {fmtTime(lastFetch)}</span>}

          </button>
          <button onClick={()=>{sessionStorage.clear();onLogout();}}
            style={{...C.btn,background:"#1a0d0d",color:"#ff6060",border:"1px solid #ff303020",fontSize:11}}>
            ⎋ Salir
          </button>
        </div>
      </header>

      {status&&<div style={{background:"#050e0a",borderBottom:"1px solid #0c2016",padding:"5px 20px",fontSize:11,color:"#00e5a0",animation:"slideDown .3s ease"}}>{status}</div>}

      {/* TABS */}
      <nav style={{display:"flex",alignItems:"center",background:"#09101d",borderBottom:"1px solid #0e1e30",padding:"0 12px",overflowX:"auto"}}>
        {[["dashboard","📊 Dashboard"],["history","📋 Historial"],["settings","⚙ Config"]].map(([id,lbl])=>(

            style={{background:"none",border:"none",color:tab===id?"#00e5a0":"#2a3a4a",padding:"10px 14px",fontSize:11,letterSpacing:1,borderBottom:tab===id?"2px solid #00e5a0":"2px solid transparent",transition:"all .2s",whiteSpace:"nowrap"}}>
            {lbl}

        <span style={{flex:1}}/>

            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Buscar pool…"

            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(210px,1fr))",gap:10}}>
              {visiblePools.map(({pool,latest,meta,count})=>{
                const nm=meta?.name||latest?.name||short(pool.address);
                const t0=nm.split(" / ")[0]||"?", t1=nm.split(" / ")[1]||"?";
                const bp=latest?.basePriceUsd;
                const chg=latest?.chg24h!=null?parseFloat(latest.chg24h):null;
                const isUp=chg!=null&&chg>=0;
                return (
                  <div key={pool.id} className="pool-card"
                    style={{background:"#09101d",border:`1px solid ${latest?.error&&!bp?"#2a1010":"#0e1e30"}`,borderRadius:7,padding:12,display:"flex",flexDirection:"column",gap:5}}>
                    <div style={{display:"flex",alignItems:"center",gap:4}}>
                      <span style={{background:"#0d2040",color:"#7ecff0",padding:"2px 6px",borderRadius:3,fontSize:9,fontWeight:"bold",maxWidth:70,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t0}</span>
                      <span style={{background:"#1e1a06",color:"#c8a040",padding:"2px 6px",borderRadius:3,fontSize:9,fontWeight:"bold",maxWidth:70,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t1}</span>
                      <span style={{marginLeft:"auto",fontSize:9,color:"#1a2535"}}>#{pool.id}</span>
                    </div>
                    <div style={{fontSize:10,color:"#5a8aaa",fontWeight:"bold",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{nm}</div>
                    {bp!=null?(
                      <>
                        <div style={{display:"flex",alignItems:"baseline",gap:6}}>
                          <span style={{fontSize:17,fontWeight:"bold",color:"#e8f4ff"}}>${formatNum(bp)}</span>
                          {chg!=null&&<span style={{fontSize:10,fontWeight:"bold",color:isUp?"#00e5a0":"#ff6060"}}>{isUp?"+":""}{chg.toFixed(2)}%</span>}
                        </div>
                        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                          {latest?.volume24h&&<span style={{fontSize:9,color:"#2a4a5a",background:"#0c1520",padding:"2px 5px",borderRadius:3}}>Vol: ${compactNum(latest.volume24h)}</span>}
                          {latest?.liquidity&&<span style={{fontSize:9,color:"#2a4a5a",background:"#0c1520",padding:"2px 5px",borderRadius:3}}>Liq: ${compactNum(latest.liquidity)}</span>}
                        </div>
                      </>
                    ):latest?.error?(
                      <div style={{fontSize:10,color:"#cc5050",fontStyle:"italic"}}>⚠ {latest.error}</div>
                    ):(
                      <div style={{fontSize:10,color:"#1e3040",fontStyle:"italic"}}>Sin datos aún</div>
                    )}
                    <div style={{display:"flex",justifyContent:"space-between",borderTop:"1px solid #0e1e30",paddingTop:4,marginTop:1}}>
                      <span style={{fontSize:8,color:"#1e3040"}}>{latest?`${fmtDate(latest.timestamp)} ${fmtTime(latest.timestamp)}`:""}</span>
                      <span style={{fontSize:8,color:"#162030"}}>{count} reg.</span>
                    </div>
                  </div>
                );
              })}
            </div>
          </>
        )}

        {/* ══ HISTORIAL ══ */}
        {tab==="history"&&(
          <>
            <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12,flexWrap:"wrap"}}>
              <select value={filterPool} onChange={e=>setFilterPool(e.target.value)}
                style={{background:"#09101d",border:"1px solid #0e1e30",color:"#b0c4d8",padding:"7px 10px",borderRadius:5,fontFamily:"monospace",fontSize:11}}>
                <option value="all">Todas las pools (29)</option>
                {POOLS.map(p=><option key={p.id} value={p.id}>#{p.id} — {poolMeta[p.address]?.name||short(p.address)}</option>)}
              </select>
              <button onClick={exportCSV} style={{...C.btn,background:"#0d2a1a",color:"#00e5a0",border:"1px solid #00e5a030"}}>⬇ Descargar CSV</button>
              <span style={{fontSize:10,color:"#2a3a4a",marginLeft:"auto"}}>{filteredRecs.length} registros</span>
            </div>
            {filteredRecs.length===0
              ?<div style={{color:"#2a3a4a",textAlign:"center",padding:"60px 20px",lineHeight:2.2,fontSize:13}}>
                Sin registros. Presiona <strong style={{color:"#00e5a0"}}>↻ Actualizar</strong>.
              </div>
              :<div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,fontFamily:"monospace"}}>
                  <thead><tr>
                    {["#","Pool","Par","Precio Base USD","Vol 24h","Liquidez","24h %","Fecha","Hora","Estado"].map(h=>(
                      <th key={h} style={C.th}>{h}</th>
                    ))}
                  </tr></thead>
                  <tbody>
                    {filteredRecs.map((r,i)=>{
                      const chg=r.chg24h!=null?parseFloat(r.chg24h):null;
                      const isUp=chg!=null&&chg>=0;
                      return (
                        <tr key={i} style={{background:i%2===0?"#070b12":"#09101d"}}>
                          <td style={{...C.td,color:"#2a3545"}}>{filteredRecs.length-i}</td>
                          <td style={C.td}><span style={{background:"#0d2040",color:"#7ecff0",padding:"2px 6px",borderRadius:3,fontSize:10}}>{r.name||short(r.address)}</span></td>
                          <td style={{...C.td,color:"#556"}}>{r.baseToken||"—"}/{r.quoteToken||"—"}</td>
                          <td style={{...C.td,color:"#00e5a0",fontWeight:"bold"}}>{r.basePriceUsd?"$"+formatNum(r.basePriceUsd):"—"}</td>
                          <td style={C.td}>{r.volume24h?"$"+compactNum(r.volume24h):"—"}</td>
                          <td style={C.td}>{r.liquidity?"$"+compactNum(r.liquidity):"—"}</td>
                          <td style={{...C.td,color:chg!=null?(isUp?"#00e5a0":"#ff6060"):"inherit"}}>{chg!=null?(isUp?"+":"")+chg.toFixed(2)+"%":"—"}</td>
                          <td style={{...C.td,color:"#556"}}>{fmtDate(r.timestamp)}</td>
                          <td style={{...C.td,color:"#00e5a0"}}>{fmtTime(r.timestamp)}</td>
                          <td style={C.td}>{r.error?<span style={{background:"#2a0d0d",color:"#ff6060",padding:"2px 6px",borderRadius:3}}>✕</span>:<span style={{background:"#0d2a1a",color:"#00e5a0",padding:"2px 6px",borderRadius:3}}>✓</span>}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            }
          </>
        )}

        {/* ══ CONFIG ══ */}
        {tab==="settings"&&(
          <div style={{display:"flex",flexDirection:"column",gap:14,maxWidth:700}}>
            <div style={{background:"#09101d",border:"1px solid #0e1e30",borderRadius:8,padding:18}}>
              <h3 style={{fontSize:11,color:"#5a9aaa",letterSpacing:2,textTransform:"uppercase",margin:"0 0 12px"}}>⏱ Auto-actualización</h3>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {[[0,"Manual"],[5,"5 min"],[15,"15 min"],[30,"30 min"],[60,"1 h"],[360,"6 h"]].map(([v,l])=>(
                  <button key={v} onClick={()=>setAutoMin(v)}
                    style={{...C.btn,background:autoMin===v?"#0d2a1a":"#070b12",border:autoMin===v?"1px solid #00e5a0":"1px solid #0e1e30",color:autoMin===v?"#00e5a0":"#2a4050"}}>
                    {l}
                  </button>
                ))}
              </div>
              {autoMin>0&&<p style={{fontSize:11,color:"#2a4050",marginTop:8}}>✅ Auto-fetch activo cada <strong style={{color:"#00e5a0"}}>{autoMin} min</strong>. Mantén la pestaña abierta.</p>}
            </div>

            <div style={{background:"#09101d",border:"1px solid #0e1e30",borderRadius:8,padding:18}}>
              <h3 style={{fontSize:11,color:"#5a9aaa",letterSpacing:2,textTransform:"uppercase",margin:"0 0 12px"}}>🗄 Base de datos</h3>
              {[["Pools","29"],["Registros guardados",records.length],["Retención","72 h (3 días)"],["Almacenamiento","localStorage (este navegador)"],["Red","Ronin Network"],["API","GeckoTerminal v2 (gratis)"]].map(([k,v])=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #0e1e30"}}>
                  <span style={{fontSize:12,color:"#445"}}>{k}</span>
                  <span style={{fontSize:12,color:"#7ecff0",fontFamily:"monospace"}}>{v}</span>
                </div>
              ))}
            </div>

            <div style={{background:"#09101d",border:"1px solid #0e1e30",borderRadius:8,padding:18}}>
              <h3 style={{fontSize:11,color:"#5a9aaa",letterSpacing:2,textTransform:"uppercase",margin:"0 0 12px"}}>🔐 Contraseña</h3>
              <p style={{fontSize:11,color:"#2a4050",lineHeight:1.8}}>
                Para cambiar la contraseña, abrí el archivo <code style={{color:"#7ecff0"}}>index.html</code> con un editor de texto (Notepad, VS Code, etc.) y buscá la línea:<br/>
                <code style={{color:"#00e5a0",display:"block",marginTop:6,padding:"6px 10px",background:"#070b12",borderRadius:4}}>const CW_PASSWORD = "craftworld2024";</code>
                Reemplazá <code style={{color:"#c8a040"}}>craftworld2024</code> por tu nueva contraseña y volvé a subir el archivo a GitHub.
              </p>
            </div>

            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{if(confirm("¿Borrar TODOS los registros?")){ setRecords([]); DB.set(RECORDS_KEY,[]); setStatus("🗑 Historial borrado."); }}}
                style={{...C.btn,background:"#2a0d0d",color:"#ff6b6b",border:"1px solid #ff3a3a40",padding:"10px 18px"}}>
                🗑 Borrar historial
              </button>
            </div>
          </div>
        )}
      </main>
    </div>
  );
}

/* ════════════════════════════════════════════════════════
   ROOT: controla login vs app
════════════════════════════════════════════════════════ */
function Root() {
  const [authed, setAuthed] = useState(window._cwAuth.check());
  if (!authed) return <LoginScreen onAuth={()=>setAuthed(true)}/>;
  return <Tracker onLogout={()=>setAuthed(false)}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
